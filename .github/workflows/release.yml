name: release

## Pipeline de distribuição Windows do Verso (Photino.Blazor + WebView2, net10.0).
## O app é Windows-only (Photino/WebView2), então o runner é windows-latest.
##
## Publica DUAS variantes por release (matrix cpu|gpu), ambas single-file (DLLs gerenciadas
## embutidas no Verso.App.exe / Verso.Worker.exe) e portáteis (dados em <appdir>/data).
## Layout do zip: Verso.App.exe + Verso.Worker.exe + wwwroot/ + runtimes/.
## O Worker é processo separado (transcrição); o App o spawna sob demanda como sibling —
## o usuário só abre Verso.App.exe (WinExe, sem console).
##   - cpu: VersoIncludeGpuRuntimes=false — só CPU/NoAvx (~200 MB)
##   - gpu: VersoIncludeGpuRuntimes=true — CUDA/CUDA12/Vulkan win-x64 (~960 MB)
## Cleanup remove RIDs não-win e peso morto (pdb/xml) antes do zip.
##
## Gatilhos:
##   - push para main           -> calcula próxima versão (incrementa patch da última tag),
##                                 builda as 2 variantes, cria a tag, gera GitHub Release
##   - push de tag v*.*.*       -> builda as 2 variantes e cria GitHub Release com os 2 zips
##   - workflow_dispatch        -> builda e publica artifacts (sem Release), útil para validação
on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write   # necessário para criar o GitHub Release e fazer upload dos assets

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            gpu_runtimes: 'false'
          - variant: gpu
            gpu_runtimes: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determinar versão
        id: version
        shell: pwsh
        run: |
          # Tag v*.*.* -> version SEM o 'v' (NuGet rejeita 'v0.1.0');
          # Push para main -> auto-incrementa patch da última tag;
          # Dispatch -> dev version com short SHA.
          if ($env:GITHUB_REF -match 'refs/tags/(v.*)') {
            $tag = $Matches[1]          # v0.1.0
            $ver = $tag.Substring(1)    # 0.1.0
          } elseif ($env:GITHUB_REF -eq 'refs/heads/main') {
            $latest = git tag --list 'v*.*.*' --sort=-v:refname | Select-Object -First 1
            if (-not $latest) {
              $ver = '0.1.0'
            } else {
              $lastVer = $latest.Substring(1)
              $parts = $lastVer.Split('.')
              $patch = [int]$parts[2] + 1
              $ver = "$($parts[0]).$($parts[1]).$patch"
            }
            $tag = "v$ver"
          } else {
            $tag = ''
            $ver = "0.0.0-dev+$($env:GITHUB_SHA.Substring(0,7))"
          }
          Write-Host "tag=$tag version=$ver"
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Publicar self-contained (win-x64, single-file)
        shell: pwsh
        run: |
          # Single-file empacota DLLs gerenciadas no Verso.App.exe. Nativos
          # (Photino/WebView2/whisper.cpp/CUDA) ficam em runtimes/. O target
          # PublishVersoWorker do App.csproj republica o Worker no mesmo -o.
          # VersoIncludeGpuRuntimes controla se CUDA/Vulkan entram via NuGet.
          dotnet publish src/Verso.App/Verso.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=false `
            -p:VersoIncludeGpuRuntimes=${{ matrix.gpu_runtimes }} `
            -p:Version=${{ steps.version.outputs.version }} `
            -o publish/${{ matrix.variant }}

      - name: Publicar Verso.Worker self-contained (win-x64, single-file)
        shell: pwsh
        run: |
          # Redundante com PublishVersoWorker do App, mas garante o sibling
          # mesmo se o target do App for pulado. Mesmo PublishDir e flags.
          dotnet publish src/Verso.Worker/Verso.Worker.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=false `
            -p:VersoIncludeGpuRuntimes=${{ matrix.gpu_runtimes }} `
            -p:Version=${{ steps.version.outputs.version }} `
            -o publish/${{ matrix.variant }}

      - name: Remover runtimes e arquivos desnecessários
        shell: pwsh
        run: |
          $pub = "publish/${{ matrix.variant }}"
          # 1. Pacotes CPU (Runtime/NoAvx) ainda trazem RIDs multiplataforma —
          #    remove tudo que não é win-x64 (e flavors cuda*/vulkan com sub-RIDs).
          Get-ChildItem "$pub/runtimes" -Directory -ErrorAction SilentlyContinue |
            ForEach-Object {
              $top = $_.Name
              if ($top -match '^(cuda|cuda12|vulkan)$') {
                Get-ChildItem $_ -Directory -ErrorAction SilentlyContinue |
                  Where-Object { $_.Name -ne 'win-x64' } |
                  Remove-Item -Recurse -Force
              } elseif ($top -match '^(linux|macos|osx|win-arm64|win-x86|browser|ios|android|maccatalyst|tvos|coreml)') {
                Remove-Item $_.FullName -Recurse -Force
              } elseif ($top -eq 'noavx') {
                Get-ChildItem $_ -Directory -ErrorAction SilentlyContinue |
                  Where-Object { $_.Name -ne 'win-x64' } |
                  Remove-Item -Recurse -Force
              }
            }
          # 2. Safety net: variante CPU não deve ter CUDA/Vulkan (NuGet já omitiu).
          if ('${{ matrix.variant }}' -eq 'cpu') {
            Get-ChildItem "$pub/runtimes" -Directory -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match '^(cuda|cuda12|vulkan)$' } |
              Remove-Item -Recurse -Force
          }
          # 3. Peso morto: símbolos, docs XML, Metal.
          Get-ChildItem $pub -Recurse -Include *.pdb,*.xml,ggml-metal.metal -File -ErrorAction SilentlyContinue |
            Remove-Item -Force
          $files = @(Get-ChildItem $pub -Recurse -File)
          $sum = ($files | Measure-Object Length -Sum).Sum
          Write-Host "Arquivos: $($files.Count); tamanho: $([math]::Round($sum/1MB, 1)) MB"

      - name: Assinar executáveis (Azure Trusted Signing)
        # Ativa automaticamente quando AZURE_SIGNING_ACCOUNT estiver definido (repo Variables).
        # Enquanto não configurado, o build sai sem assinar (alerta do SmartScreen permanece).
        if: ${{ vars.AZURE_SIGNING_ACCOUNT != '' }}
        uses: azure/artifact-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CERTIFICATE_PROFILE }}
          files-folder: publish/${{ matrix.variant }}
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
      - name: Empacotar zip
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.version }}'
          $variant = '${{ matrix.variant }}'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zip = "Verso-${ver}-${variant}-win-x64.zip"
          Compress-Archive -Path "publish/$variant/*" -DestinationPath "dist/$zip" -Force
          Write-Host "Criado dist/$zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Verso-${{ matrix.variant }}-win-x64
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determinar versão/tag
        id: rel
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Push de tag: extrair direto
            tag="${GITHUB_REF#refs/tags/}"
            ver="${tag#v}"
            echo "new_tag=false" >> "$GITHUB_OUTPUT"
          else
            # Push para main: auto-incrementar patch da última tag
            latest=$(git tag --list 'v*.*.*' --sort=-v:refname | head -1)
            if [ -z "$latest" ]; then
              ver="0.1.0"
            else
              lastVer="${latest#v}"
              IFS='.' read -r -a parts <<< "$lastVer"
              ver="${parts[0]}.${parts[1]}.$((parts[2] + 1))"
            fi
            tag="v${ver}"
            echo "new_tag=true" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Criar tag (push para main)
        if: steps.rel.outputs.new_tag == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.rel.outputs.tag }}"
          git push origin "${{ steps.rel.outputs.tag }}"

      - name: Baixar artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets

      - name: Criar GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.rel.outputs.tag }}"
          ver="${{ steps.rel.outputs.version }}"
          gh release create "$tag" -R "${{ github.repository }}" \
            assets/Verso-cpu-win-x64/*.zip assets/Verso-gpu-win-x64/*.zip \
            --title "Verso $ver" \
            --notes "Verso $ver (Windows x64)

          - **Verso-${ver}-cpu-win-x64.zip** (~200 MB) — sem GPU, roda em qualquer máquina. Recomendado para quem não tem NVIDIA.
          - **Verso-${ver}-gpu-win-x64.zip** (~960 MB) — inclui runtimes CUDA/Vulkan para aceleração por GPU.

          Build self-contained single-file (Photino.Blazor + WebView2) — não requer instalação do .NET runtime. A pasta contém Verso.App.exe, Verso.Worker.exe (iniciado automaticamente na transcrição), wwwroot/ e runtimes/ nativos. Ambos os exes são WinExe (sem janela de console).

          App portátil: modelos, áudios, banco de dados e logs ficam numa pasta data/ ao lado do exe — mover a pasta leva tudo junto, sem depender de %AppData%.

          Pré-requisito: Windows 10/11 com o Microsoft Edge WebView2 Runtime (presente por padrão no Windows 11).

          Descompacte e execute Verso.App.exe."
