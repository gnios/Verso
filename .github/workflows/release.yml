name: release

# Pipeline de distribuição cross-platform do Verso (Photino.Blazor, net10.0).
# O app agora roda em Windows (WebView2) e Linux (WebKitGTK) — mesmos Razor components.
#
# Publica DUAS variantes por plataforma (matrix os × cpu|gpu), ambas single-file
# (DLLs gerenciadas embutidas no Verso/Verso.App.exe — raiz limpa) e portáteis
# (dados em <appdir>/data):
#   - cpu: sem runtimes CUDA/Vulkan — roda em qualquer máquina
#   - gpu: com runtimes CUDA/Vulkan — aceleração por GPU NVIDIA
# Plataformas:
#   - windows-latest → win-x64  (WebView2 embutido no Windows 10/11)
#   - ubuntu-latest  → linux-x64 (requer WebKitGTK + ffmpeg no destino)
#
# Gatilhos:
#   - push de tag v*.*.*  -> builda tudo e cria um GitHub Release com os zips
#   - workflow_dispatch    -> builda e publica artifacts (sem Release)
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write   # necessário para criar o GitHub Release e fazer upload dos assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: Verso-cpu-win-x64
            variant: cpu
          - os: windows-latest
            rid: win-x64
            artifact: Verso-gpu-win-x64
            variant: gpu
          - os: ubuntu-latest
            rid: linux-x64
            artifact: Verso-cpu-linux-x64
            variant: cpu
          - os: ubuntu-latest
            rid: linux-x64
            artifact: Verso-gpu-linux-x64
            variant: gpu
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Instalar dependências Linux (WebKitGTK p/ Photino)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libwebkit2gtk-4.1-0 libavcodec-extra

      - name: Determinar versão
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" =~ refs/tags/(v.*) ]]; then
            tag="${BASH_REMATCH[1]}"
            ver="${tag#v}"
          else
            tag=""
            ver="0.0.0-dev+${GITHUB_SHA:0:7}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Publicar self-contained (single-file)
        shell: bash
        run: |
          # Single-file empacota TODAS as DLLs gerenciadas dentro do executável, deixando
          # a raiz limpa. Nativos (Photino/whisper.cpp/CUDA) ficam externos em
          # runtimes/<rid>/native/ — assim ainda dá para remover runtimes CUDA/Vulkan
          # não desejados antes do zip (variante CPU) sem inchar o exe.
          dotnet publish src/Verso.App/Verso.App.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=false \
            -p:Version=${{ steps.version.outputs.version }} \
            -o publish/${{ matrix.variant }}

      - name: Remover runtimes e arquivos desnecessários
        shell: bash
        run: |
          pub="publish/${{ matrix.variant }}"
          rid="${{ matrix.rid }}"

          # Variante CPU: remove CUDA e Vulkan inteiros, deixa só o runtime CPU nativo.
          if [ "${{ matrix.variant }}" = "cpu" ]; then
            find "$pub/runtimes" -maxdepth 1 -type d \( -name 'cuda*' -o -name 'vulkan' \) -exec rm -rf {} + 2>/dev/null || true
          fi

          # Remove runtimes CUDA/Vulkan de plataformas estrangeiras ao RID atual.
          for d in "$pub/runtimes"/*/ ; do
            name="$(basename "$d")"
            case "$name" in
              cuda|cuda12|vulkan)
                # dentro de cada flavor de GPU, remove os RIDs que não são o atual
                find "$d" -maxdepth 1 -type d ! -name "$rid" -exec rm -rf {} + 2>/dev/null || true
                ;;
              linux|win|win-*)
                # remove pastas de SO diferente do RID alvo
                [ "${name%%-*}" != "${rid%%-*}" ] && rm -rf "$d" 2>/dev/null || true
                ;;
              osx|macos|coreml)
                rm -rf "$d" 2>/dev/null || true
                ;;
            esac
          done

          # Peso morto: símbolos de debug, docs XML e o backend Metal (macOS-only) do whisper.
          find "$pub" -type f \( -name '*.pdb' -o -name '*.xml' -o -name 'ggml-metal.metal' \) -delete 2>/dev/null || true

          # wwwroot já está EMBUTIDO no exe (ManifestEmbeddedFileProvider); a pasta solta
          # que o publish materializa é redundante — removida para não expor HTML/CSS/JS.
          rm -rf "$pub/wwwroot" 2>/dev/null || true

          sum=$(du -sb "$pub" 2>/dev/null | awk '{printf "%.1f", $1/1048576}')
          echo "Tamanho de publish apos cleanup: ${sum} MB"

      - name: Assinar executável (Azure Trusted Signing — só Windows)
        # Ativa automaticamente quando AZURE_SIGNING_ACCOUNT estiver definido (repo Variables).
        if: runner.os == 'Windows' && vars.AZURE_SIGNING_ACCOUNT != ''
        uses: azure/artifact-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CERTIFICATE_PROFILE }}
          files-folder: publish/${{ matrix.variant }}
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Empacotar zip
        shell: bash
        run: |
          ver='${{ steps.version.outputs.version }}'
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            zip="Verso-${ver}-${{ matrix.variant }}-${{ matrix.rid }}.zip"
            7z a -tzip "dist/$zip" "./publish/${{ matrix.variant }}/*" >/dev/null
          else
            zip="Verso-${ver}-${{ matrix.variant }}-${{ matrix.rid }}.tar.gz"
            tar -czf "dist/$zip" -C "publish/${{ matrix.variant }}" .
          fi
          echo "Criado dist/$zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Baixar artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets

      - name: Determinar versão/tag
        id: rel
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          ver="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Criar GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.rel.outputs.tag }}"
          ver="${{ steps.rel.outputs.version }}"
          gh release create "$tag" -R "${{ github.repository }}" \
            assets/Verso-cpu-win-x64/* assets/Verso-gpu-win-x64/* \
            assets/Verso-cpu-linux-x64/* assets/Verso-gpu-linux-x64/* \
            --title "Verso $ver" \
            --notes "Verso $ver — Windows x64 + Linux x64

          ## Windows x64
          - **Verso-${ver}-cpu-win-x64.zip** — sem GPU, roda em qualquer máquina. Recomendado para quem não tem NVIDIA.
          - **Verso-${ver}-gpu-win-x64.zip** — inclui runtimes CUDA/Vulkan para aceleração por GPU.

          ## Linux x64
          - **Verso-${ver}-cpu-linux-x64.tar.gz** — sem GPU.
          - **Verso-${ver}-gpu-linux-x64.tar.gz** — inclui runtimes CUDA/Vulkan para aceleração por GPU.

          Build self-contained single-file — não requer instalação do .NET runtime. A pasta raiz contém só o executável (e os nativos do Photino/whisper.cpp); as DLLs gerenciadas estão embutidas.

          App portátil: modelos, áudios, banco de dados e logs ficam numa pasta \`data/\` ao lado do executável — mover a pasta leva tudo junto.

          ### Pré-requisitos Windows
          Windows 10/11 com o Microsoft Edge WebView2 Runtime (presente por padrão no Windows 11).

          ### Pré-requisitos Linux
          WebKitGTK e ffmpeg (para decodificação de áudio via whisper.net):
          \`\`\`bash
          sudo apt-get install -y libgtk-3-0 libwebkit2gtk-4.1-0 libavcodec-extra ffmpeg
          \`\`\`

          Descompacte e execute o Verso."