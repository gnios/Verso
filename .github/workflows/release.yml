name: release

## Pipeline de distribuição multiplataforma do Verso (Photino.Blazor, net10.0).
##
## Matrix por OS/RID × cpu|gpu:
##   - windows-latest / win-x64     — WebView2; gpu = CUDA.Windows + Vulkan
##   - ubuntu-latest  / linux-x64   — WebKitGTK (deps no usuário); gpu = CUDA.Linux + Vulkan
##   - macos-latest   / osx-arm64   — WKWebView; gpu = CoreML
##
## Single-file (DLLs gerenciadas embutidas). Layout: App.exe na raiz + engine/ (Worker, wwwroot, runtimes, nativos).
## Worker é sibling spawnado sob demanda (sem console no Windows via WinExe).
## Assinatura Azure Trusted Signing só no Windows.
##
## Gatilhos:
##   - push para main           -> auto-incrementa patch, builda, tag, GitHub Release
##   - push de tag v*.*.*       -> builda e cria GitHub Release
##   - workflow_dispatch        -> artifacts sem Release
on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            variant: cpu
            gpu_runtimes: 'false'
          - os: windows-latest
            rid: win-x64
            variant: gpu
            gpu_runtimes: 'true'
          - os: ubuntu-latest
            rid: linux-x64
            variant: cpu
            gpu_runtimes: 'false'
          - os: ubuntu-latest
            rid: linux-x64
            variant: gpu
            gpu_runtimes: 'true'
          - os: macos-latest
            rid: osx-arm64
            variant: cpu
            gpu_runtimes: 'false'
          - os: macos-latest
            rid: osx-arm64
            variant: gpu
            gpu_runtimes: 'true'
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determinar versão
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            ver="${tag#v}"
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            latest=$(git tag --list 'v*.*.*' --sort=-v:refname | head -1)
            if [ -z "$latest" ]; then
              ver="0.1.0"
            else
              lastVer="${latest#v}"
              IFS='.' read -r -a parts <<< "$lastVer"
              ver="${parts[0]}.${parts[1]}.$((parts[2] + 1))"
            fi
            tag="v${ver}"
          else
            tag=""
            ver="0.0.0-dev+${GITHUB_SHA::7}"
          fi
          echo "tag=$tag version=$ver"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Liberar disco do runner
        shell: bash
        run: |
          # GPU CUDA enche o disco do windows-latest se bins intermediários acumularem.
          rm -rf src/*/bin src/*/obj tests/*/bin tests/*/obj || true
          df -h . || true

      - name: Publicar App + Worker (self-contained, single-file)
        shell: bash
        run: |
          set -euo pipefail
          OUT="publish/${{ matrix.variant }}-${{ matrix.rid }}"
          rm -rf "$OUT"
          # Um único publish do App: target PublishVersoWorker já coloca o Worker sibling.
          # Segundo publish do Worker no mesmo -o já apagou nativos em releases quebradas.
          dotnet publish src/Verso.App/Verso.App.csproj \
            -c Release \
            -r "${{ matrix.rid }}" \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=false \
            -p:DeleteExistingFiles=false \
            -p:VersoIncludeGpuRuntimes=${{ matrix.gpu_runtimes }} \
            -p:Version=${{ steps.version.outputs.version }} \
            -o "$OUT"

          if [[ "${{ matrix.rid }}" == win-* ]]; then
            test -f "$OUT/Verso.App.exe"
            test -f "$OUT/engine/Verso.Worker.exe"
          else
            chmod +x "$OUT/Verso.App" "$OUT/engine/Verso.Worker"
            test -f "$OUT/Verso.App"
            test -f "$OUT/engine/Verso.Worker"
          fi
          # Raiz limpa: só o App; payload em engine/ (pdbs removidos no LayoutPayloadDirectory).
          root_extras=$(find "$OUT" -maxdepth 1 -mindepth 1 ! -name 'Verso.App' ! -name 'Verso.App.exe' ! -name 'engine' ! -name 'data' | wc -l | tr -d ' ')
          if [[ "$root_extras" -gt 0 ]]; then
            echo "::warning::itens inesperados na raiz do publish:"
            find "$OUT" -maxdepth 1 -mindepth 1 ! -name 'Verso.App' ! -name 'Verso.App.exe' ! -name 'engine' ! -name 'data' || true
          fi

      - name: Remover runtimes e arquivos desnecessários
        shell: bash
        run: |
          set -euo pipefail
          PUB="publish/${{ matrix.variant }}-${{ matrix.rid }}"
          PAYLOAD="$PUB/engine"
          RID="${{ matrix.rid }}"
          VARIANT="${{ matrix.variant }}"

          case "$RID" in
            win-x64) KEEP="win-x64"; KEEP_ALT="" ;;
            linux-x64) KEEP="linux-x64"; KEEP_ALT="" ;;
            osx-arm64) KEEP="osx-arm64"; KEEP_ALT="macos-arm64" ;;
            osx-x64) KEEP="osx-x64"; KEEP_ALT="macos-x64" ;;
            *) KEEP="$RID"; KEEP_ALT="" ;;
          esac

          keep_rid() {
            local name="$1"
            [[ "$name" == "$KEEP" || ( -n "$KEEP_ALT" && "$name" == "$KEEP_ALT" ) ]]
          }

          if [[ -d "$PAYLOAD/runtimes" ]]; then
            for top in "$PAYLOAD/runtimes"/*; do
              [[ -d "$top" ]] || continue
              name=$(basename "$top")
              case "$name" in
                cuda|cuda12|vulkan|noavx|coreml)
                  for sub in "$top"/*; do
                    [[ -d "$sub" ]] || continue
                    subname=$(basename "$sub")
                    if ! keep_rid "$subname"; then
                      rm -rf "$sub"
                    fi
                  done
                  if [[ -z "$(find "$top" -type f | head -1)" ]]; then
                    rm -rf "$top"
                  fi
                  ;;
                *)
                  if ! keep_rid "$name"; then
                    rm -rf "$top"
                  fi
                  ;;
              esac
            done
          fi

          if [[ "$VARIANT" == "cpu" ]]; then
            rm -rf "$PAYLOAD/runtimes/cuda" "$PAYLOAD/runtimes/cuda12" "$PAYLOAD/runtimes/vulkan" "$PAYLOAD/runtimes/coreml" 2>/dev/null || true
          fi

          if [[ "$RID" == osx-* ]]; then
            rm -rf "$PAYLOAD/runtimes/cuda" "$PAYLOAD/runtimes/cuda12" "$PAYLOAD/runtimes/vulkan" 2>/dev/null || true
            if [[ "$VARIANT" == "cpu" ]]; then
              rm -rf "$PAYLOAD/runtimes/coreml" 2>/dev/null || true
            fi
          else
            rm -rf "$PAYLOAD/runtimes/coreml" 2>/dev/null || true
          fi

          find "$PUB" -type f \( -name '*.pdb' -o -name '*.xml' -o -name 'ggml-metal.metal' \) -delete 2>/dev/null || true

          count=$(find "$PUB" -type f | wc -l | tr -d ' ')
          size=$(du -sm "$PUB" | cut -f1)
          echo "Arquivos: $count; tamanho: ${size} MB"

      - name: Validar payload nativo
        shell: bash
        run: |
          set -euo pipefail
          PUB="publish/${{ matrix.variant }}-${{ matrix.rid }}"
          PAYLOAD="$PUB/engine"
          RID="${{ matrix.rid }}"
          VARIANT="${{ matrix.variant }}"

          if [[ ! -d "$PAYLOAD" ]]; then
            echo "::error::pasta engine/ ausente — LayoutPayloadDirectory falhou?"
            exit 1
          fi

          # SQLite nativo em engine/ — sem isto o app abre e fecha no MigrateAsync.
          if ! find "$PAYLOAD" -type f \( -name 'e_sqlite3.dll' -o -name 'libe_sqlite3.so' -o -name 'libe_sqlite3.dylib' \) | grep -q .; then
            echo "::error::e_sqlite3 nativo ausente em $PAYLOAD"
            find "$PAYLOAD" -maxdepth 3 -type f | head -50
            exit 1
          fi

          rt_files=$(find "$PAYLOAD/runtimes" -type f 2>/dev/null | wc -l | tr -d ' ')
          echo "runtimes files: $rt_files"
          if [[ "${rt_files:-0}" -lt 1 ]]; then
            echo "::error::engine/runtimes/ sem arquivos — publish incompleto (disco cheio ou NuGet?)"
            exit 1
          fi

          if [[ "$VARIANT" == "gpu" && "$RID" == win-* ]]; then
            if [[ ! -d "$PAYLOAD/runtimes/cuda" && ! -d "$PAYLOAD/runtimes/cuda12" && ! -d "$PAYLOAD/runtimes/vulkan" ]]; then
              echo "::error::variante GPU win sem cuda/cuda12/vulkan"
              exit 1
            fi
            gpu_bytes=$(find "$PAYLOAD/runtimes"/cuda* "$PAYLOAD/runtimes/vulkan" -type f -printf '%s\n' 2>/dev/null | awk '{s+=$1} END {print s+0}')
            echo "gpu native bytes: $gpu_bytes"
            if [[ "$gpu_bytes" -lt 50000000 ]]; then
              echo "::error::nativos GPU pequenos demais ($gpu_bytes bytes) — zip quebrado como 0.2.12"
              find "$PAYLOAD/runtimes" -type f | head -40
              exit 1
            fi
          fi

          if [[ "$VARIANT" == "gpu" && "$RID" == linux-* ]]; then
            gpu_bytes=$(find "$PAYLOAD/runtimes"/cuda* "$PAYLOAD/runtimes/vulkan" -type f -printf '%s\n' 2>/dev/null | awk '{s+=$1} END {print s+0}')
            if [[ "$gpu_bytes" -lt 50000000 ]]; then
              echo "::error::nativos GPU linux pequenos demais ($gpu_bytes bytes)"
              exit 1
            fi
          fi

          if [[ "$VARIANT" == "gpu" && "$RID" == osx-* ]]; then
            if [[ ! -d "$PAYLOAD/runtimes/coreml" ]] || [[ -z "$(find "$PAYLOAD/runtimes/coreml" -type f | head -1)" ]]; then
              echo "::error::variante GPU mac sem CoreML"
              exit 1
            fi
          fi

          echo "Validação OK"

      - name: Assinar executáveis (Azure Trusted Signing)
        if: ${{ matrix.os == 'windows-latest' && vars.AZURE_SIGNING_ACCOUNT != '' }}
        uses: azure/artifact-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CERTIFICATE_PROFILE }}
          files-folder: publish/${{ matrix.variant }}-${{ matrix.rid }}
          files-folder-filter: exe
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Empacotar zip
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.version }}'
          $variant = '${{ matrix.variant }}'
          $rid = '${{ matrix.rid }}'
          $out = "publish/${variant}-${rid}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zipName = "Verso-${ver}-${variant}-${rid}.zip"
          $zipPath = Join-Path dist $zipName
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          # ZipFile.CreateFromDirectory inclui subpastas/nativos de forma confiável
          # (Compress-Archive com wildcard e o zip.exe do Git Bash já geraram
          # releases com runtimes/ vazios — ver 0.2.12-gpu).
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::CreateFromDirectory(
            (Resolve-Path $out).Path,
            (Join-Path (Resolve-Path dist).Path $zipName))
          $item = Get-Item $zipPath
          Write-Host "Criado $($item.Name) ($([math]::Round($item.Length/1MB,1)) MB)"
          if ($variant -eq 'gpu' -and $rid -like 'win-*' -and $item.Length -lt 80MB) {
            throw "Zip GPU win suspeito ($([math]::Round($item.Length/1MB,1)) MB) — esperado > 200 MB"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Verso-${{ matrix.variant }}-${{ matrix.rid }}
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determinar versão/tag
        id: rel
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            ver="${tag#v}"
            echo "new_tag=false" >> "$GITHUB_OUTPUT"
          else
            latest=$(git tag --list 'v*.*.*' --sort=-v:refname | head -1)
            if [ -z "$latest" ]; then
              ver="0.1.0"
            else
              lastVer="${latest#v}"
              IFS='.' read -r -a parts <<< "$lastVer"
              ver="${parts[0]}.${parts[1]}.$((parts[2] + 1))"
            fi
            tag="v${ver}"
            echo "new_tag=true" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Criar tag (push para main)
        if: steps.rel.outputs.new_tag == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.rel.outputs.tag }}"
          git push origin "${{ steps.rel.outputs.tag }}"

      - name: Baixar artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets

      - name: Criar GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.rel.outputs.tag }}"
          ver="${{ steps.rel.outputs.version }}"
          mapfile -t zips < <(find assets -type f -name '*.zip' | sort)
          if [ "${#zips[@]}" -eq 0 ]; then
            echo "Nenhum zip encontrado em assets/" >&2
            exit 1
          fi
          gh release create "$tag" -R "${{ github.repository }}" \
            "${zips[@]}" \
            --title "Verso $ver" \
            --notes "Verso $ver

          ### Windows (x64)
          - **Verso-${ver}-cpu-win-x64.zip** — CPU. WebView2.
          - **Verso-${ver}-gpu-win-x64.zip** — CUDA/Vulkan. WebView2.

          ### Linux (x64)
          - **Verso-${ver}-cpu-linux-x64.zip** — CPU. Requer WebKitGTK no sistema.
          - **Verso-${ver}-gpu-linux-x64.zip** — CUDA/Vulkan. Requer WebKitGTK + drivers NVIDIA/Vulkan.

          ### macOS (Apple Silicon)
          - **Verso-${ver}-cpu-osx-arm64.zip** — CPU. WKWebView nativo.
          - **Verso-${ver}-gpu-osx-arm64.zip** — Core ML.

          Build self-contained (Photino.Blazor) — não requer .NET instalado.
          Pasta: Verso.App(+.exe) na raiz; Worker, wwwroot/, runtimes/ e nativos em engine/.
          Dados portáteis em data/ ao lado do app.

          **Linux:** instale WebKitGTK (ex.: \`libwebkit2gtk-4.1-0\` no Ubuntu/Debian).
          **Windows:** Edge WebView2 Runtime (padrão no Windows 11).

          Descompacte e execute o Verso.App da sua plataforma."
