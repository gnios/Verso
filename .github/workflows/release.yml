name: release

# Pipeline de distribuição Windows do Verso (app WPF + Blazor Hybrid, net10.0-windows).
# O app é Windows-only (WPF/WebView2 não rodam em Linux), então o runner é windows-latest.
#
# Publica DUAS variantes por release (matrix cpu|gpu):
#   - cpu: sem runtimes CUDA/Vulkan (~150 MB) — roda em qualquer máquina
#   - gpu: com runtimes CUDA/Vulkan win-x64 (~650 MB) — aceleração por GPU NVIDIA
# Ambas removem runtimes Linux/macOS (inúteis no Windows).
#
# Gatilhos:
#   - push de tag v*.*.*  -> builda as 2 variantes e cria um GitHub Release com os 2 zips
#   - workflow_dispatch    -> builda e publica artifacts (sem Release), útil para validação
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write   # necessário para criar o GitHub Release e fazer upload dos assets

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [cpu, gpu]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determinar versão
        id: version
        shell: pwsh
        run: |
          # Tag v*.*.* -> version SEM o 'v' (NuGet rejeita 'v0.1.0'); short SHA no dispatch.
          if ($env:GITHUB_REF -match 'refs/tags/(v.*)') {
            $tag = $Matches[1]          # v0.1.0
            $ver = $tag.Substring(1)    # 0.1.0
          } else {
            $tag = ''
            $ver = "0.0.0-dev+$($env:GITHUB_SHA.Substring(0,7))"
          }
          Write-Host "tag=$tag version=$ver"
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Publicar self-contained (win-x64, pasta)
        shell: pwsh
        run: |
          # Pasta (não single-file) para permitir remoção de runtimes antes do zip.
          dotnet publish src/Verso.App/Verso.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:Version=${{ steps.version.outputs.version }} `
            -o publish/${{ matrix.variant }}

      - name: Remover runtimes desnecessários
        shell: pwsh
        run: |
          $pub = "publish/${{ matrix.variant }}"
          # 1. Remove RIDs não-win-x64 (linux/osx/...) dos flavors de GPU (cuda, cuda12, vulkan).
          Get-ChildItem "$pub/runtimes" -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match '^(cuda|cuda12|vulkan)$' } |
            ForEach-Object {
              Get-ChildItem $_ -Directory | Where-Object { $_.Name -ne 'win-x64' } | Remove-Item -Recurse -Force
            }
          # 2. Variante CPU: remove CUDA e Vulkan inteiros, deixa só o runtime CPU (runtimes/win-x64).
          if ('${{ matrix.variant }}' -eq 'cpu') {
            Get-ChildItem "$pub/runtimes" -Directory -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match '^(cuda|cuda12|vulkan)$' } |
              Remove-Item -Recurse -Force
          }
          $sum = (Get-ChildItem $pub -Recurse -File | Measure-Object Length -Sum).Sum
          Write-Host "Tamanho de publish apos cleanup: $([math]::Round($sum/1MB, 1)) MB"

      - name: Assinar Verso.App.exe (Azure Trusted Signing)
        # Ativa automaticamente quando AZURE_SIGNING_ACCOUNT estiver definido (repo Variables).
        # Enquanto não configurado, o build sai sem assinar (alerta do SmartScreen permanece).
        if: ${{ vars.AZURE_SIGNING_ACCOUNT != '' }}
        uses: azure/artifact-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CERTIFICATE_PROFILE }}
          files-folder: publish/${{ matrix.variant }}
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
      - name: Empacotar zip
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.version }}'
          $variant = '${{ matrix.variant }}'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zip = "Verso-${ver}-${variant}-win-x64.zip"
          Compress-Archive -Path "publish/$variant/*" -DestinationPath "dist/$zip" -Force
          Write-Host "Criado dist/$zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Verso-${{ matrix.variant }}-win-x64
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Baixar artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets

      - name: Determinar versão/tag
        id: rel
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          ver="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Criar GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.rel.outputs.tag }}"
          ver="${{ steps.rel.outputs.version }}"
          gh release create "$tag" -R "${{ github.repository }}" \
            assets/Verso-cpu-win-x64/*.zip assets/Verso-gpu-win-x64/*.zip \
            --title "Verso $ver" \
            --notes "Verso $ver (Windows x64)

          - **Verso-${ver}-cpu-win-x64.zip** (~150 MB) — sem GPU, roda em qualquer máquina. Recomendado para quem não tem NVIDIA.
          - **Verso-${ver}-gpu-win-x64.zip** (~650 MB) — inclui runtimes CUDA/Vulkan para aceleração por GPU.

          Build self-contained — não requer instalação do .NET runtime.

          Pré-requisito: Windows 10/11 com o Microsoft Edge WebView2 Runtime (presente por padrão no Windows 11).

          Descompacte e execute Verso.App.exe."