<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Verso</title>
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<div id="app">Carregando…</div>

<script>
    // Interop mínimo (T57): alterna a classe `dark` no elemento raiz do documento,
    // equivalente ao `html.dark` do protótipo. Não há equivalente em C#/Blazor puro para
    // manipular classList do documento hospedeiro, então isso fica isolado aqui em vez de
    // duplicado — ver BlazorThemeApplicator.cs.
    window.versoInterop = {
        setDarkTheme: function (isDark) {
            document.documentElement.classList.toggle('dark', isDark);
        }
    };
</script>
<script>
    // Reprodutor de áudio HTML5 para o shell cross-platform (Photino). O <audio> é
    // controlado por versoPlayback.* e os eventos de posição/término são repassados ao
    // HtmlMediaPlaybackService (C#) via DotNetObjectReference. A mídia local é servida
    // pelo scheme customizado verso-media:// (registrado em Program.cs), que faz stream
    // do arquivo do disco — o webview não abre file:// de um path absoluto.
    (function () {
        let audio = null;
        let dotnet = null;
        const ensure = () => {
            if (!audio) {
                audio = new Audio();
                audio.addEventListener('timeupdate', () => {
                    if (dotnet) dotnet.invokeMethodAsync('RaisePositionChanged', audio.currentTime);
                });
                audio.addEventListener('loadedmetadata', () => {
                    if (dotnet) dotnet.invokeMethodAsync('RaiseMetadata', audio.duration || 0);
                });
                audio.addEventListener('ended', () => {
                    if (dotnet) dotnet.invokeMethodAsync('RaiseEnded');
                });
            }
            return audio;
        };
        window.versoPlayback = {
            init: function (ref) { dotnet = ref; },
            load: function (url, rate, volume) {
                const a = ensure();
                a.src = url;
                a.playbackRate = rate || 1;
                a.volume = (volume ?? 100) / 100;
            },
            unload: function () { if (audio) { audio.pause(); audio.removeAttribute('src'); audio.load(); } },
            play: function () { if (audio) audio.play().catch(() => {}); },
            pause: function () { if (audio) audio.pause(); },
            seek: function (seconds) { if (audio) audio.currentTime = seconds; },
            setRate: function (rate) { if (audio) audio.playbackRate = rate || 1; },
            setVolume: function (vol) { if (audio) audio.volume = vol; }
        };
    })();
</script>

<div id="blazor-error-ui">
    Ocorreu um erro inesperado.
    <a href="" class="reload">Recarregar</a>
    <a class="dismiss">🗙</a>
</div>
<!-- Define window.versoWaveform antes do Blazor iniciar (T66); Recording.razor só invoca
     essas funções via IJSRuntime após o primeiro OnAfterRenderAsync, então a ordem em relação
     a blazor.webview.js abaixo não é sensível a race condition. -->
<script src="js/waveform.js"></script>
<script src="js/editor.js"></script>
<script src="_framework/blazor.webview.js"></script>
</body>
</html>
